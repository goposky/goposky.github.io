<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Loving Memory | S Ramachandran (Chandru)</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fcfaf8;
            --text-color: #333c41;
            --accent-color: #7d8a81; /* Soft Sage Green */
            --light-gray: #e0e0e0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            line-height: 1.8;
        }

        header {
            padding: 100px 20px 60px;
            text-align: center;
        }

        h1 {
            font-family: 'Libre Baskerville', serif;
            font-weight: 400;
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .dates {
            font-size: 1.1rem;
            color: var(--accent-color);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .main-photo-container {
            max-width: 800px;
            margin: 0 auto 60px;
            padding: 0 20px;
        }

        .main-photo {
            width: 100%;
            height: auto;
            border-radius: 2px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .content {
            max-width: 700px;
            margin: 0 auto;
            padding: 0 25px;
            text-align: center;
        }

        .quote {
            font-family: 'Libre Baskerville', serif;
            font-style: italic;
            font-size: 1.4rem;
            margin-bottom: 40px;
            color: #555;
        }

        .biography {
            text-align: left;
            margin-bottom: 80px;
        }

        .gallery {
            display: flex;
            flex-direction: column;
            gap: 40px;
            margin-top: 50px;
            padding-bottom: 100px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .gallery img {
            width: 100%;
            height: auto;
            border-radius: 2px;
            filter: grayscale(20%);
            transition: filter 0.3s ease;
        }

        .gallery img:hover {
            filter: grayscale(0%);
        }

        footer {
            padding: 60px 20px;
            text-align: center;
            font-size: 0.9rem;
            border-top: 1px solid var(--light-gray);
            color: var(--accent-color);
        }

        hr {
            border: 0;
            border-top: 1px solid var(--light-gray);
            width: 50px;
            margin: 40px auto;
        }
    </style>
</head>
<body>

    <header>
        <div class="dates">Palur Venugopalaswamy thunai. <br>Tirupati Venkatachalapathy thunai. <br>Kalamassery Mahaganapathy thunai.</div>
        <h1>S Ramachandran (Chandru)</h1>
        <div class="dates">1948 — 2016</div>
    </header>

    <div class="main-photo-container">
        <img src="portrait.jpg?v=2" alt="In Memory" class="main-photo">
    </div>

    <div class="content">
        <div class="quote">
            Ten years on, his influence remains the foundation of our lives. <br>
            I will share some fond memories in this space.
        </div>

            </figure>

    </div>

    <footer>
        <p><a href="/" style="color: inherit; text-decoration: none;">← Back to goposky.com</a></p>
    </footer>

</body>
</html>
